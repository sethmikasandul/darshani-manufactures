<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දර්ශනී Manufactures - Firebase System</title>
    <style>
        /* CSS කොටස නැවත සම්පූර්ණයෙන් එක් කර ඇත */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+Sinhala:wght@300;400;600&display=swap');
        :root { --primary: #ff4757; --dark: #2f3542; --green: #2ed573; --bg-color: #f1f2f6; }
        body { font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif; margin: 0; background-color: var(--bg-color); }
        header { background: linear-gradient(135deg, rgba(47, 53, 66, 0.9), rgba(0, 0, 0, 0.8)), url('https://media.istockphoto.com/id/463329259/photo/traditional-chilli-sauce.jpg?s=2048x2048&w=is&k=20&c=PF39oOgypOUfwRZnwVTdifAKv8G5imnii_zyyPjQztU='); background-size: cover; padding: 50px 20px; color: white; text-align: center; }
        .nav-bar { background: rgba(47, 53, 66, 0.95); padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s; text-decoration: none; }
        .btn-nav { background: white; color: var(--dark); margin: 0 5px; }
        .btn-nav:hover { background: var(--primary); color: white; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 30px; }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; width: 250px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 700px; margin: 50px auto; padding: 30px; border-radius: 15px; position: relative; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: var(--dark); color: white; }
    </style>
</head>
<body>

<header>
    <h1>දර්ශනී Manufactures & Distributors</h1>
    <p>පාරිභෝගික විශ්වාසය දිනූ විශිෂ්ටතම සේවාව</p>
</header>

<div class="nav-bar">
    <div>
        <button class="btn btn-nav" onclick="toggleModal('cartModal')">Cart <span id="cart-counter" style="background:red; color:white; padding:2px 6px; border-radius:50%; font-size:12px;">0</span></button>
    </div>
    <div>
        <button id="admin-login-btn" class="btn btn-nav" onclick="checkAdminLogin()">Admin</button>
        <button id="admin-dashboard-btn" class="btn btn-nav" style="display:none;" onclick="toggleModal('adminModal')">Dashboard</button>
    </div>
</div>

<div class="container" id="shop-container">භාණ්ඩ පූරණය වෙමින් පවතී...</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <span onclick="toggleModal('adminModal')" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <h2>ඇඩ්මින් පාලක පැනලය</h2>
        <div style="background:#f1f2f6; padding:20px; border-radius:10px;">
            <h4>නව භාණ්ඩයක් එක් කරන්න</h4>
            <input type="text" id="itemName" placeholder="භාණ්ඩයේ නම">
            <input type="number" id="itemPrice" placeholder="මිල (රු.)">
            <input type="text" id="itemImg" placeholder="පින්තූර Link එක">
            <button class="btn" style="background:var(--green); color:white; width:100%" onclick="addItem()">Add Item</button>
        </div>
        <h3>ලැබී ඇති ඇණවුම්</h3>
        <div style="overflow-x:auto;"><table id="orderTable"><thead><tr><th>නම</th><th>විස්තර</th><th>මුදල</th></tr></thead><tbody id="orderListBody"></tbody></table></div>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <span onclick="toggleModal('cartModal')" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <h2>මගේ කරත්තය</h2>
        <div id="cart-list"></div>
        <input type="text" id="custName" placeholder="ඔබේ නම">
        <input type="text" id="custPhone" placeholder="WhatsApp අංකය">
        <button class="btn" style="background:var(--green); color:white; width:100%" onclick="placeOrder()">ඇණවුම් කරන්න</button>
    </div>
</div>

<script>
    // පියවර 1: ඔබේ URL එක මෙතැනට දමන්න (අගට / සලකුණ එපා)
    const FIREBASE_URL = https://dharshani-34034-default-rtdb.firebaseio.com
:; 

    let items = [];
    let cart = [];
    let isAdmin = false;

    // Firebase එකෙන් දත්ත කියවීම
    async function loadShop() {
        try {
            const response = await fetch(`${FIREBASE_URL}/products.json`);
            const data = await response.json();
            const container = document.getElementById('shop-container');
            container.innerHTML = '';
            
            if (data) {
                items = Object.keys(data).map(key => ({...data[key], firebaseKey: key}));
                items.forEach((item, index) => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${item.img || 'https://via.placeholder.com/150'}">
                            <h3>${item.name}</h3>
                            <p>රු. ${item.price}</p>
                            <button class="btn" style="background:var(--primary); color:white; width:100%" onclick="addToCart(${index})">කරත්තයට</button>
                            ${isAdmin ? `<button onclick="deleteItem('${item.firebaseKey}')" style="color:red; border:none; background:none; cursor:pointer; margin-top:10px;">මකන්න</button>` : ''}
                        </div>`;
                });
            } else {
                container.innerHTML = 'තවමත් භාණ්ඩ ඇතුළත් කර නැත.';
            }
        } catch (e) {
            console.error(e);
        }
    }

    // Firebase එකට දත්ත ඇතුළත් කිරීම
    async function addItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;

        if (name && price) {
            const newItem = { name, price, img };
            await fetch(`${FIREBASE_URL}/products.json`, {
                method: 'POST',
                body: JSON.stringify(newItem)
            });
            alert("සාර්ථකව ඇතුළත් කළා!");
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemImg').value = '';
            loadShop();
        } else {
            alert("කරුණාකර නම සහ මිල ඇතුළත් කරන්න.");
        }
    }

    async function deleteItem(key) {
        if(confirm("මෙය මැකීමට අවශ්‍යද?")) {
            await fetch(`${FIREBASE_URL}/products/${key}.json`, { method: 'DELETE' });
            loadShop();
        }
    }

    function addToCart(index) {
        cart.push(items[index]);
        document.getElementById('cart-counter').innerText = cart.length;
        alert("එක් කළා!");
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === "block") ? "none" : "block";
    }

    function checkAdminLogin() {
        if (prompt("මුරපදය ඇතුළත් කරන්න:") === "1234") {
            isAdmin = true;
            document.getElementById('admin-login-btn').style.display = 'none';
            document.getElementById('admin-dashboard-btn').style.display = 'inline-block';
            loadShop();
            toggleModal('adminModal');
        }
    }

    loadShop();
</script>
</body>
</html>
